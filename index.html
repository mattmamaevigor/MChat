<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Söhne:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Marked.js for Markdown -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --bg:         #212121;
      --bg2:        #2f2f2f;
      --bg3:        #3a3a3a;
      --sidebar:    #171717;
      --border:     rgba(255,255,255,0.1);
      --accent:     #d4a574;
      --accent2:    #c96442;
      --text:       #ececec;
      --text2:      #b4b4b4;
      --muted:      #666;
      --danger:     #ef4444;
      --user-bg:    #2f2f2f;
      --ai-bg:      transparent;
      --sidebar-w:  260px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Söhne', ui-sans-serif, system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-size: 15px;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      z-index: 100;
    }

    .sidebar-top {
      padding: 12px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .logo {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; font-size: 13px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .brand-name span { color: var(--accent); }

    #newChatBtn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      width: 100%;
      text-align: left;
    }
    #newChatBtn:hover { background: var(--bg2); color: var(--text); }

    .sidebar-section-label {
      padding: 16px 12px 6px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #chatList {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }
    #chatList::-webkit-scrollbar { width: 4px; }
    #chatList::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13.5px;
      color: var(--text2);
      transition: background 0.15s, color 0.15s;
      position: relative;
      group: true;
    }
    .chat-item:hover { background: var(--bg2); color: var(--text); }
    .chat-item.active { background: var(--bg2); color: var(--text); }

    .chat-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-title input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13.5px;
      width: 100%;
    }

    .chat-item-actions {
      display: none;
      gap: 2px;
      flex-shrink: 0;
    }
    .chat-item:hover .chat-item-actions { display: flex; }

    .chat-action-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 3px 5px;
      border-radius: 4px;
      font-size: 13px;
      transition: color 0.15s, background 0.15s;
    }
    .chat-action-btn:hover { color: var(--text); background: var(--bg3); }
    .chat-action-btn.del:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .sidebar-footer span { color: var(--accent); }

    /* ── MAIN ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    #menuBtn {
      display: none;
      position: fixed;
      top: 12px; left: 12px;
      z-index: 200;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px; height: 36px;
      align-items: center; justify-content: center;
      cursor: pointer; color: var(--text2);
    }
    #menuBtn:hover { color: var(--text); }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .model-select {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-title-display {
      font-size: 14px;
      color: var(--text2);
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── CHAT ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 20px;
      text-align: center;
    }
    .welcome-logo {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #fff; font-size: 20px;
      margin-bottom: 20px;
    }
    .welcome h2 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .welcome h2 span { color: var(--accent); }
    .welcome p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }

    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; max-width: 560px;
    }
    .chip {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); background: var(--bg3); }

    /* Messages */
    .msg-wrap {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .msg-wrap.user { background: var(--bg); }
    .msg-wrap.ai { background: var(--bg); }
    .msg-wrap:last-child { border-bottom: none; }

    .msg-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      margin-top: 2px;
    }
    .msg-avatar.ai-av {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .msg-avatar.user-av {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .msg-content { flex: 1; min-width: 0; }

    .msg-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .msg-text {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      word-break: break-word;
    }

    /* Markdown styles inside msg-text */
    .msg-text p { margin-bottom: 10px; }
    .msg-text p:last-child { margin-bottom: 0; }
    .msg-text h1,.msg-text h2,.msg-text h3 {
      font-weight: 600; margin: 16px 0 8px;
      line-height: 1.3;
    }
    .msg-text h1 { font-size: 20px; }
    .msg-text h2 { font-size: 17px; }
    .msg-text h3 { font-size: 15px; }
    .msg-text ul,.msg-text ol { padding-left: 20px; margin-bottom: 10px; }
    .msg-text li { margin-bottom: 4px; line-height: 1.6; }
    .msg-text strong { font-weight: 600; color: #fff; }
    .msg-text em { font-style: italic; }
    .msg-text a { color: var(--accent); text-decoration: underline; }
    .msg-text blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      color: var(--text2);
      margin: 10px 0;
    }
    .msg-text table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 14px;
    }
    .msg-text th,.msg-text td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .msg-text th { background: var(--bg2); font-weight: 600; }
    .msg-text hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* Code */
    .msg-text code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: #e5c07b;
    }

    .code-block {
      margin: 12px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #1a1a1a;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #252525;
      border-bottom: 1px solid var(--border);
    }
    .code-lang {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .code-copy {
      background: none; border: none;
      color: var(--text2); cursor: pointer;
      font-size: 12px; font-family: inherit;
      padding: 3px 8px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .code-copy:hover { background: var(--bg3); color: var(--text); }
    .code-copy.copied { color: #4ade80; }

    .code-block pre {
      padding: 14px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.65;
      color: #abb2bf;
    }
    .code-block pre code { background: none; padding: 0; color: inherit; font-size: inherit; }

    /* Msg actions */
    .msg-actions {
      display: flex;
      gap: 4px;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .msg-wrap:hover .msg-actions { opacity: 1; }

    .msg-action {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .msg-action:hover { background: var(--bg2); color: var(--text); }
    .msg-action.copied { color: #4ade80; }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--accent);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.6s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0; }
    }

    /* Thinking */
    .thinking-wrap {
      padding: 20px 0;
    }
    .thinking-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .thinking-av {
      width: 32px; height: 32px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .thinking-dots {
      display: flex; gap: 5px; align-items: center;
    }
    .thinking-dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: tdot 1.4s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Error */
    .error-msg {
      max-width: 720px;
      margin: 12px auto;
      padding: 12px 24px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: #f87171;
      font-size: 13px;
    }

    /* ── INPUT ── */
    .input-area {
      padding: 16px 20px 20px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-box {
      max-width: 720px;
      margin: 0 auto;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .input-box:focus-within { border-color: rgba(212,165,116,0.4); }

    .input-row {
      display: flex;
      align-items: flex-end;
      padding: 12px 14px;
      gap: 10px;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 200px;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--muted); }

    #sendBtn {
      width: 36px; height: 36px;
      border-radius: 8px; border: none;
      background: var(--accent2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { opacity: 0.3; cursor: default; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      #sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); box-shadow: 4px 0 30px rgba(0,0,0,0.6); }
      #menuBtn { display: flex; }
      .topbar { padding-left: 56px; }
      #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
      #overlay.show { display: block; }
    }

    .no-chats {
      text-align: center; padding: 20px 10px;
      font-size: 12px; color: var(--muted); line-height: 1.8;
    }

    /* Fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-wrap { animation: fadeUp 0.2s ease; }
  </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>
<button id="menuBtn" onclick="toggleSidebar()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-brand">
      <div class="logo">MC</div>
      <div class="brand-name">M<span>Chat</span></div>
    </div>
    <button id="newChatBtn" onclick="newChat()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Новый чат
    </button>
  </div>

  <div class="sidebar-section-label">Чаты</div>
  <div id="chatList"></div>

  <div class="sidebar-footer">
    <span id="statChats">0</span> чатов · <span id="statMsgs">0</span> сообщений
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="chat-title-display" id="chatTitleDisplay">MChat</div>
    <div class="topbar-right">
      <div class="model-select">✦ Gemini 2.5 Pro</div>
    </div>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <div class="input-box">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Напиши сообщение MChat..."></textarea>
        <button id="sendBtn" onclick="send()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="input-hint">Enter — отправить · Shift+Enter — новая строка</div>
  </div>
</div>

<script>
const API = "/api/chat";
const SYSTEM = "Ты — MChat, умный и дружелюбный ИИ-помощник на базе Gemini 2.5 Pro. Отвечай чётко, полезно и развёрнуто. Используй Markdown для форматирования: заголовки, списки, код. Всегда отвечай на том языке, на котором пишет пользователь.";
const STORAGE_KEY = "mchat_v4";

let chats = [];
let activeChatId = null;
let sending = false;

const $ = id => document.getElementById(id);
const input   = $("input");
const chatEl  = $("chat");
const sendBtn = $("sendBtn");

// ── Marked config ──
marked.setOptions({
  breaks: true,
  gfm: true,
});

// Custom renderer for code blocks with copy button
const renderer = new marked.Renderer();
renderer.code = (code, lang) => {
  const safeCode = escHtml(typeof code === 'object' ? code.text : code);
  const safeLang = (typeof code === 'object' ? code.lang : lang) || 'plaintext';
  const id = 'cb_' + Math.random().toString(36).slice(2);
  return `<div class="code-block">
    <div class="code-header">
      <span class="code-lang">${safeLang}</span>
      <button class="code-copy" onclick="copyCode(this,'${id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Копировать
      </button>
    </div>
    <pre><code id="${id}">${safeCode}</code></pre>
  </div>`;
};
marked.use({ renderer });

// ── Storage ──
function saveChats() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); } catch(e) {}
  updateStats();
}
function loadChats() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) chats = JSON.parse(raw);
  } catch(e) { chats = []; }
}

// ── Chat management ──
function newChat() {
  const id = "c" + Date.now();
  chats.unshift({ id, title: "Новый чат", messages: [] });
  activeChatId = id;
  saveChats(); renderSidebar(); renderChat(); closeSidebar();
  input.focus();
}

function switchChat(id) {
  activeChatId = id;
  renderSidebar(); renderChat(); closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) activeChatId = chats.length ? chats[0].id : null;
  saveChats(); renderSidebar(); renderChat();
}

function startRename(id, e) {
  e.stopPropagation();
  const item = document.querySelector(`.chat-item[data-id="${id}"] .chat-item-title`);
  if (!item) return;
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  item.innerHTML = `<input type="text" value="${escAttr(chat.title)}" onblur="finishRename('${id}',this)" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape')this.blur();" />`;
  item.querySelector('input').focus();
  item.querySelector('input').select();
}

function finishRename(id, input) {
  const chat = chats.find(c => c.id === id);
  if (chat) {
    chat.title = input.value.trim() || "Новый чат";
    saveChats();
  }
  renderSidebar();
  if (activeChatId === id) $("chatTitleDisplay").textContent = chat?.title || "MChat";
}

function getActive() { return chats.find(c => c.id === activeChatId); }
function autoTitle(t) { return t.length > 38 ? t.slice(0, 38) + "…" : t; }

// ── Sidebar ──
function renderSidebar() {
  const list = $("chatList");
  if (!chats.length) {
    list.innerHTML = '<div class="no-chats">Нет чатов.<br>Нажми «Новый чат».</div>';
    return;
  }
  list.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id === activeChatId ? 'active' : ''}" data-id="${c.id}" onclick="switchChat('${c.id}')">
      <span class="chat-item-title">${escHtml(c.title)}</span>
      <div class="chat-item-actions">
        <button class="chat-action-btn" onclick="startRename('${c.id}',event)" title="Переименовать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="chat-action-btn del" onclick="deleteChat('${c.id}',event)" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>`).join("");
}

function updateStats() {
  $("statChats").textContent = chats.length;
  $("statMsgs").textContent = chats.reduce((s, c) => s + c.messages.length, 0);
}

// ── Chat render ──
function renderChat() {
  const chat = getActive();
  chatEl.innerHTML = "";

  if (!chat || !chat.messages.length) {
    chatEl.innerHTML = `
      <div class="welcome">
        <div class="welcome-logo">MC</div>
        <h2>Привет! Я <span>MChat</span></h2>
        <p>Умный помощник на базе Gemini 2.5 Pro.<br>Задай любой вопрос — отвечу развёрнуто и точно.</p>
        <div class="chips">
          <div class="chip" onclick="ask('Что сейчас происходит в мире?')">🌍 Новости</div>
          <div class="chip" onclick="ask('Напиши змейку на Python')">🐍 Код</div>
          <div class="chip" onclick="ask('Какой сейчас курс доллара?')">💵 Курс</div>
          <div class="chip" onclick="ask('Объясни квантовую физику просто')">⚛️ Наука</div>
          <div class="chip" onclick="ask('Расскажи смешной анекдот')">😄 Анекдот</div>
          <div class="chip" onclick="ask('Лучшие фильмы 2025 года')">🎬 Кино</div>
        </div>
      </div>`;
    $("chatTitleDisplay").textContent = "MChat";
  } else {
    $("chatTitleDisplay").textContent = chat.title;
    chat.messages.forEach(m => {
      if (m.role !== "system") addMessage(m.role === "user" ? "user" : "ai", m.content, false);
    });
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ── Message bubble ──
function addMessage(role, text, animate = true) {
  // Remove welcome
  chatEl.querySelector(".welcome")?.remove();

  const wrap = document.createElement("div");
  wrap.className = `msg-wrap ${role}`;
  if (!animate) wrap.style.animation = "none";

  const inner = document.createElement("div");
  inner.className = "msg-inner";

  const av = document.createElement("div");
  av.className = `msg-avatar ${role === "ai" ? "ai-av" : "user-av"}`;
  av.textContent = role === "ai" ? "MC" : "Я";

  const content = document.createElement("div");
  content.className = "msg-content";

  const name = document.createElement("div");
  name.className = "msg-name";
  name.textContent = role === "ai" ? "MChat" : "Вы";

  const msgText = document.createElement("div");
  msgText.className = "msg-text";

  if (role === "user") {
    msgText.textContent = text;
  } else {
    msgText.innerHTML = renderMarkdown(text);
  }

  // Actions
  const actions = document.createElement("div");
  actions.className = "msg-actions";

  const copyBtn = document.createElement("button");
  copyBtn.className = "msg-action";
  copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`;
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = "✓ Скопировано";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`;
        copyBtn.classList.remove("copied");
      }, 2000);
    });
  };
  actions.appendChild(copyBtn);

  content.appendChild(name);
  content.appendChild(msgText);
  content.appendChild(actions);
  inner.appendChild(av);
  inner.appendChild(content);
  wrap.appendChild(inner);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;

  return msgText;
}

function renderMarkdown(text) {
  try { return marked.parse(text); }
  catch { return escHtml(text); }
}

// ── Thinking indicator ──
function showThinking() {
  removeThinking();
  const div = document.createElement("div");
  div.className = "thinking-wrap"; div.id = "thinking";
  div.innerHTML = `<div class="thinking-inner">
    <div class="thinking-av">MC</div>
    <div class="thinking-dots">
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
    </div>
  </div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function removeThinking() { $("thinking")?.remove(); }

// ── Copy code ──
function copyCode(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.classList.add("copied");
    btn.textContent = "✓ Скопировано";
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`;
    }, 2000);
  });
}

// ── Send ──
async function send() {
  const text = input.value.trim();
  if (!text || sending) return;

  if (!activeChatId) newChat();
  const chat = getActive();
  if (!chat) return;

  input.value = ""; input.style.height = "auto";
  sendBtn.disabled = true; sending = true;

  if (!chat.messages.length) {
    chat.title = autoTitle(text);
    $("chatTitleDisplay").textContent = chat.title;
  }

  chat.messages.push({ role: "user", content: text });
  saveChats();
  addMessage("user", text);
  renderSidebar();
  showThinking();

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [{ role: "system", content: SYSTEM }, ...chat.messages]
      }),
    });

    removeThinking();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const errDiv = document.createElement("div");
      errDiv.className = "error-msg";
      errDiv.textContent = "⚠️ " + (err?.error?.message || "Ошибка сервера");
      chatEl.appendChild(errDiv);
      chat.messages.pop(); saveChats();
      return;
    }

    // Streaming
    const msgEl = addMessage("ai", "");
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    msgEl.appendChild(cursor);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          if (json.text) {
            fullText += json.text;
            cursor.remove();
            msgEl.innerHTML = renderMarkdown(fullText);
            msgEl.appendChild(cursor);
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        } catch {}
      }
    }

    cursor.remove();
    msgEl.innerHTML = renderMarkdown(fullText || "Нет ответа.");

    chat.messages.push({ role: "assistant", content: fullText });
    saveChats(); renderSidebar();

  } catch (err) {
    removeThinking();
    const errDiv = document.createElement("div");
    errDiv.className = "error-msg";
    errDiv.textContent = "⚠️ Нет соединения. Проверь интернет.";
    chatEl.appendChild(errDiv);
    chat.messages.pop(); saveChats();
  } finally {
    sendBtn.disabled = false; sending = false;
    input.focus();
  }
}

function ask(text) {
  if (!activeChatId) newChat();
  input.value = text; send();
}

// ── Helpers ──
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escAttr(s) {
  return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// ── Input resize ──
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 200) + "px";
});
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── Sidebar mobile ──
function toggleSidebar() {
  $("sidebar").classList.toggle("open");
  $("overlay").classList.toggle("show");
}
function closeSidebar() {
  $("sidebar").classList.remove("open");
  $("overlay").classList.remove("show");
}

// ── Init ──
loadChats();
if (chats.length) activeChatId = chats[0].id;
renderChat();
renderSidebar();
updateStats();
</script>
