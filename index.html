<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080c18;
      --bg2:      #0d1220;
      --bg3:      #111827;
      --border:   rgba(110,255,200,0.12);
      --accent:   #6effc8;
      --accent2:  #3b82f6;
      --text:     #dde6f5;
      --muted:    #4a5878;
      --danger:   #ff5f57;
      --sidebar-w: 260px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    #sidebar {
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: var(--bg); font-size: 13px;
      flex-shrink: 0;
    }

    .brand { flex: 1; }
    .brand h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
    .brand h1 span { color: var(--accent); }
    .brand small { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    #newChatBtn {
      margin: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: var(--bg); font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 13px;
      padding: 10px 14px;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    #newChatBtn:hover { opacity: 0.87; }
    #newChatBtn:active { transform: scale(0.97); }

    .section-label {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #chatList {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }
    #chatList::-webkit-scrollbar { width: 3px; }
    #chatList::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      color: #8898b8;
      transition: background 0.15s, color 0.15s;
    }
    .chat-item:hover { background: var(--bg3); color: var(--text); }
    .chat-item.active {
      background: rgba(110,255,200,0.08);
      color: var(--accent);
      border: 1px solid rgba(110,255,200,0.15);
    }
    .chat-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-item-del {
      opacity: 0;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .chat-item:hover .chat-item-del { opacity: 1; }
    .chat-item-del:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-val { color: var(--accent); }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #menuBtn {
      display: none;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 200;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px; height: 36px;
      align-items: center; justify-content: center;
      cursor: pointer; color: var(--text);
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .chat-title-display {
      font-size: 15px; font-weight: 700;
      flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .model-pill {
      background: rgba(110,255,200,0.08);
      border: 1px solid rgba(110,255,200,0.2);
      color: var(--accent);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #1a2438; border-radius: 4px; }

    .welcome {
      text-align: center;
      margin: auto;
      padding: 40px 20px;
      max-width: 480px;
    }
    .welcome-icon { font-size: 42px; margin-bottom: 14px; display: block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .welcome h2 {
      font-size: 28px; font-weight: 800;
      line-height: 1.2; margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    .welcome h2 span { color: var(--accent); }
    .welcome p { color: var(--muted); font-size: 14px; line-height: 1.7; }

    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 22px;
    }
    .chip {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      color: #8898b8;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Syne', sans-serif;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.2s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .avatar.ai-av {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--bg);
    }
    .avatar.user-av {
      background: rgba(59,130,246,0.2);
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent2);
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, #122040, #1a3666);
      border: 1px solid rgba(59,130,246,0.25);
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble.error {
      background: #1a0d0d;
      border: 1px solid rgba(255,95,87,0.3);
      color: #ff8080; font-size: 13px;
      border-bottom-left-radius: 4px;
    }
    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(0,0,0,0.35);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .bubble pre {
      background: #0a0f1e;
      border: 1px solid rgba(110,255,200,0.1);
      border-radius: 10px;
      padding: 14px;
      margin-top: 10px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .bubble pre code { background: none; padding: 0; }

    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .thinking {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13px; color: var(--muted);
      animation: fadeUp 0.2s ease;
      align-self: flex-start;
    }
    .think-dots { display: flex; gap: 4px; }
    .think-dot {
      width: 5px; height: 5px;
      background: var(--accent); border-radius: 50%;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .think-dot:nth-child(2) { animation-delay: 0.2s; }
    .think-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%,80%,100%{transform:scale(0.6);opacity:0.3}
      40%{transform:scale(1);opacity:1}
    }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: var(--bg2);
      border: 1px solid rgba(110,255,200,0.18);
      border-radius: 14px;
      display: flex; align-items: flex-end;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(110,255,200,0.45); }
    textarea {
      flex: 1; background: transparent; border: none;
      color: var(--text); font-size: 14.5px;
      font-family: 'Syne', sans-serif;
      padding: 12px 14px; resize: none; outline: none;
      max-height: 130px; line-height: 1.55;
    }
    textarea::placeholder { color: var(--muted); }
    #sendBtn {
      width: 42px; height: 42px;
      border-radius: 11px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s, transform 0.1s;
    }
    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { opacity: 0.3; cursor: default; }

    @media (max-width: 680px) {
      #sidebar { position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%); }
      #sidebar.open { transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,0.6); }
      #menuBtn { display:flex; }
      .topbar { padding-left: 58px; }
      #overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99; }
      #overlay.show { display:block; }
    }
    .no-chats { text-align:center;padding:20px 10px;font-size:12px;color:var(--muted);line-height:1.7; }
  </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>
<button id="menuBtn" onclick="toggleSidebar()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo">MC</div>
    <div class="brand">
      <h1>M<span>Chat</span></h1>
      <small>v3.1 · Gemini 2.5 Flash</small>
    </div>
  </div>
  <button id="newChatBtn" onclick="newChat()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Новый чат
  </button>
  <div class="section-label">История чатов</div>
  <div id="chatList"></div>
  <div class="sidebar-footer">
    <div class="stat-row"><span>Чатов сохранено</span><span class="stat-val" id="statChats">0</span></div>
    <div class="stat-row"><span>Сообщений всего</span><span class="stat-val" id="statMsgs">0</span></div>
    <div class="stat-row"><span>Модель</span><span class="stat-val">Gemini ✦</span></div>
  </div>
</div>

<div id="main">
  <div class="topbar">
    <div class="chat-title-display" id="chatTitleDisplay">Новый чат</div>
    <div class="model-pill">✦ Gemini 2.5 Flash</div>
  </div>
  <div id="chat"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Напиши сообщение..."></textarea>
    </div>
    <button id="sendBtn" onclick="send()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="#0a0f1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API = "/api/chat";
  const SYSTEM = "Ты — MChat, умный и дружелюбный ИИ-помощник на базе Gemini 2.5 Flash. Отвечай чётко и полезно. Всегда отвечай на том языке, на котором пишет пользователь.";
  const STORAGE_KEY = "mchat_v31";

  let chats = [], activeChatId = null, sending = false;
  const $ = id => document.getElementById(id);
  const input = $("input"), chatEl = $("chat"), sendBtn = $("sendBtn");

  // ── STORAGE ──
  function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); } catch(e){} updateStats(); }
  function load() { try { const r=localStorage.getItem(STORAGE_KEY); if(r) chats=JSON.parse(r); } catch(e){chats=[];} }

  // ── CHAT MANAGEMENT ──
  function newChat() {
    const id = "c"+Date.now();
    chats.unshift({id, title:"Новый чат", messages:[]});
    activeChatId = id;
    save(); renderSidebar(); renderChat(); closeSidebar(); input.focus();
  }
  function switchChat(id) { activeChatId=id; renderSidebar(); renderChat(); closeSidebar(); }
  function deleteChat(id, e) {
    e.stopPropagation();
    chats = chats.filter(c=>c.id!==id);
    if(activeChatId===id) activeChatId = chats.length ? chats[0].id : null;
    save(); renderSidebar(); renderChat();
  }
  const getActive = () => chats.find(c=>c.id===activeChatId);

  // ── RENDER SIDEBAR ──
  function renderSidebar() {
    const list = $("chatList");
    if(!chats.length){ list.innerHTML='<div class="no-chats">Нет чатов.<br>Нажми «Новый чат».</div>'; return; }
    list.innerHTML = chats.map(c=>`
      <div class="chat-item ${c.id===activeChatId?'active':''}" onclick="switchChat('${c.id}')">
        <span style="font-size:14px">💬</span>
        <span class="chat-item-title">${esc(c.title)}</span>
        <button class="chat-item-del" onclick="deleteChat('${c.id}',event)">✕</button>
      </div>`).join('');
  }
  function updateStats() {
    $("statChats").textContent = chats.length;
    $("statMsgs").textContent = chats.reduce((s,c)=>s+c.messages.length,0);
  }

  // ── RENDER CHAT ──
  function renderChat() {
    const chat = getActive();
    chatEl.innerHTML = "";
    if(!chat||!chat.messages.length){
      chatEl.innerHTML=`<div class="welcome">
        <span class="welcome-icon">✦</span>
        <h2>Привет! Я <span>MChat</span></h2>
        <p>Умный помощник на базе Gemini 2.5 Flash.<br>Спроси что угодно — отвечу честно и быстро.</p>
        <div class="chips">
          <div class="chip" onclick="ask('Что сейчас происходит в мире?')">🌍 Новости</div>
          <div class="chip" onclick="ask('Напиши змейку на Python')">🐍 Код</div>
          <div class="chip" onclick="ask('Какой сейчас курс доллара?')">💵 Курс</div>
          <div class="chip" onclick="ask('Объясни квантовую физику просто')">⚛️ Наука</div>
          <div class="chip" onclick="ask('Расскажи анекдот')">😄 Анекдот</div>
          <div class="chip" onclick="ask('Лучшие фильмы 2025 года')">🎬 Кино</div>
        </div></div>`;
      $("chatTitleDisplay").textContent="Новый чат";
    } else {
      $("chatTitleDisplay").textContent=chat.title;
      chat.messages.forEach(m=>{ if(m.role!=="system") addBubble(m.role==="user"?"user":"ai",m.content,false); });
    }
    chatEl.scrollTop=chatEl.scrollHeight;
  }

  // ── BUBBLES ──
  function addBubble(role, text, animate=true) {
    const row=document.createElement("div"); row.className="msg-row "+role;
    if(!animate) row.style.animation="none";
    const av=document.createElement("div"); av.className="avatar "+(role==="ai"?"ai-av":"user-av");
    av.textContent=role==="ai"?"MC":"Я";
    const bub=document.createElement("div"); bub.className="bubble "+role;
    bub.innerHTML=role==="user"?esc(text):fmt(text);
    row.appendChild(av); row.appendChild(bub);
    chatEl.appendChild(row); chatEl.scrollTop=chatEl.scrollHeight;
    return bub;
  }

  function fmt(text) {
    let h=esc(text);
    h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`);
    h=h.replace(/`([^`\n]+)`/g,'<code>$1</code>');
    return h;
  }
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // ── TYPING ANIMATION ──
  function typeText(bub, text, speed=8) {
    return new Promise(resolve => {
      bub.innerHTML="";
      const cur=document.createElement("span"); cur.className="cursor"; bub.appendChild(cur);
      let i=0;
      const tick=setInterval(()=>{
        if(i<text.length){
          bub.innerHTML=fmt(text.slice(0,i+1));
          bub.appendChild(cur); i++;
          chatEl.scrollTop=chatEl.scrollHeight;
        } else {
          clearInterval(tick); cur.remove();
          bub.innerHTML=fmt(text); resolve();
        }
      }, speed);
    });
  }

  function showThinking() {
    removeThinking();
    const d=document.createElement("div"); d.className="thinking"; d.id="thinking";
    d.innerHTML=`<div class="think-dots"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div>Думаю...`;
    chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight;
  }
  const removeThinking = () => $("thinking")?.remove();

  // ── SEND ──
  async function send() {
    const text=input.value.trim();
    if(!text||sending) return;
    if(!activeChatId) newChat();
    const chat=getActive(); if(!chat) return;

    input.value=""; input.style.height="auto";
    sendBtn.disabled=true; sending=true;

    if(!chat.messages.length){
      chat.title=text.length>36?text.slice(0,36)+"…":text;
      $("chatTitleDisplay").textContent=chat.title;
    }
    chat.messages.push({role:"user",content:text});
    save(); addBubble("user",text); renderSidebar(); showThinking();

    try {
      const res = await fetch(API, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:[{role:"system",content:SYSTEM},...chat.messages.slice(-12)]})
      });

      removeThinking();
      const data = await res.json();

      if(!res.ok||data.error){
        addErrBubble(data?.error?.message||"Ошибка сервера");
        chat.messages.pop(); save(); return;
      }

      const reply=data.choices?.[0]?.message?.content||"Нет ответа.";
      chat.messages.push({role:"assistant",content:reply});
      save(); renderSidebar();

      const bub=addBubble("ai","");
      await typeText(bub, reply);

    } catch(err) {
      removeThinking();
      addErrBubble("Нет соединения. Проверь интернет.");
      chat.messages.pop(); save();
    } finally {
      sendBtn.disabled=false; sending=false; input.focus();
    }
  }

  function addErrBubble(msg) {
    const row=document.createElement("div"); row.className="msg-row ai";
    row.innerHTML=`<div class="avatar ai-av">MC</div><div class="bubble error">⚠️ ${esc(msg)}</div>`;
    chatEl.appendChild(row); chatEl.scrollTop=chatEl.scrollHeight;
  }
  const ask = t => { if(!activeChatId) newChat(); input.value=t; send(); };

  input.addEventListener("input",()=>{ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,130)+"px"; });
  input.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} });
  const toggleSidebar=()=>{ $("sidebar").classList.toggle("open"); $("overlay").classList.toggle("show"); };
  const closeSidebar=()=>{ $("sidebar").classList.remove("open"); $("overlay").classList.remove("show"); };

  load();
  if(chats.length) activeChatId=chats[0].id;
  renderChat(); renderSidebar(); updateStats();
</script>
</body>
</html>
