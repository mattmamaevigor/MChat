<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080c18;
      --bg2:      #0d1220;
      --bg3:      #111827;
      --border:   rgba(110,255,200,0.12);
      --accent:   #6effc8;
      --accent2:  #3b82f6;
      --text:     #dde6f5;
      --muted:    #4a5878;
      --danger:   #ff5f57;
      --sidebar-w: 260px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; height:100vh; display:flex; overflow:hidden; }

    /* ── AUTH ── */
    #authScreen {
      position:fixed; inset:0; background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      z-index:999; padding:20px;
    }
    .auth-card {
      width:100%; max-width:360px;
      background:var(--bg2); border:1px solid var(--border);
      border-radius:18px; padding:32px 28px;
      animation:cardIn .35s cubic-bezier(.16,1,.3,1);
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
    .auth-logo {
      display:flex; align-items:center; gap:10px; margin-bottom:24px;
    }
    .auth-logo-icon {
      width:38px; height:38px; border-radius:10px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-weight:800; color:var(--bg); font-size:14px;
    }
    .auth-logo h1 { font-size:20px; font-weight:800; }
    .auth-logo h1 span { color:var(--accent); }
    .auth-logo small { font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; display:block; }

    .auth-tabs {
      display:flex; background:var(--bg3); border-radius:10px;
      padding:3px; margin-bottom:22px;
    }
    .auth-tab {
      flex:1; padding:8px; border-radius:8px; border:none;
      background:transparent; color:var(--muted);
      font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all .2s;
    }
    .auth-tab.active { background:var(--bg2); color:var(--text); }

    .auth-field { margin-bottom:14px; }
    .auth-label { font-size:11px; color:var(--muted); margin-bottom:5px; display:block; font-family:'JetBrains Mono',monospace; }
    .auth-input {
      width:100%; background:var(--bg3); border:1px solid rgba(110,255,200,0.1);
      border-radius:10px; color:var(--text);
      font-family:'Syne',sans-serif; font-size:14px;
      padding:11px 13px; outline:none; transition:border-color .2s;
    }
    .auth-input:focus { border-color:rgba(110,255,200,.35); }
    .auth-input::placeholder { color:var(--muted); }

    .auth-btn {
      width:100%; margin-top:4px; padding:12px; border:none; border-radius:10px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:var(--bg); font-family:'Syne',sans-serif;
      font-size:14px; font-weight:800; cursor:pointer;
      transition:opacity .2s, transform .1s;
    }
    .auth-btn:hover { opacity:.87; }
    .auth-btn:active { transform:scale(.97); }
    .auth-err {
      margin-top:12px; padding:10px 12px;
      background:rgba(255,95,87,.1); border:1px solid rgba(255,95,87,.25);
      border-radius:8px; font-size:12px; color:#ff8080; display:none;
    }
    .auth-hint { margin-top:14px; text-align:center; font-size:11px; color:var(--muted); }

    /* ── APP ── */
    #app { flex:1; display:flex; overflow:hidden; }

    /* ── SIDEBAR ── */
    #sidebar {
      width:var(--sidebar-w); background:var(--bg2);
      border-right:1px solid var(--border);
      display:flex; flex-direction:column; flex-shrink:0;
      transition:transform 0.3s ease; z-index:100;
    }
    .sidebar-header {
      padding:16px 16px 12px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .logo {
      width:32px; height:32px; border-radius:9px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-weight:800; color:var(--bg); font-size:12px; flex-shrink:0;
    }
    .brand { flex:1; }
    .brand h1 { font-size:16px; font-weight:800; letter-spacing:-.3px; }
    .brand h1 span { color:var(--accent); }
    .brand small { font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; }

    .user-bar {
      margin:10px 10px 0;
      background:var(--bg3); border:1px solid var(--border);
      border-radius:10px; padding:9px 12px;
      display:flex; align-items:center; gap:9px;
    }
    .user-ava {
      width:28px; height:28px; border-radius:7px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:800; color:var(--bg); flex-shrink:0;
    }
    .user-email { flex:1; font-size:12px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .user-logout {
      background:none; border:none; color:var(--muted);
      cursor:pointer; font-size:14px; padding:2px; transition:color .15s;
    }
    .user-logout:hover { color:var(--danger); }

    #newChatBtn {
      margin:10px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none; border-radius:10px;
      color:var(--bg); font-family:'Syne',sans-serif;
      font-weight:700; font-size:13px;
      padding:10px 14px; cursor:pointer;
      display:flex; align-items:center; gap:8px;
      transition:opacity .2s, transform .1s;
    }
    #newChatBtn:hover { opacity:.87; }
    #newChatBtn:active { transform:scale(.97); }

    .section-label {
      padding:8px 16px 4px; font-size:10px;
      font-family:'JetBrains Mono',monospace; color:var(--muted);
      text-transform:uppercase; letter-spacing:.08em;
    }

    #chatList { flex:1; overflow-y:auto; padding:4px 8px 8px; }
    #chatList::-webkit-scrollbar { width:3px; }
    #chatList::-webkit-scrollbar-thumb { background:#1e2d45; border-radius:3px; }

    .chat-item {
      display:flex; align-items:center; gap:8px;
      padding:9px 10px; border-radius:9px; cursor:pointer;
      font-size:13px; color:#8898b8;
      transition:background .15s, color .15s;
      user-select:none;
    }
    .chat-item:hover { background:var(--bg3); color:var(--text); }
    .chat-item.active {
      background:rgba(110,255,200,0.08);
      color:var(--accent);
      border:1px solid rgba(110,255,200,0.15);
    }
    .chat-item-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-item-del {
      opacity:0; background:none; border:none;
      color:var(--muted); cursor:pointer; font-size:14px;
      padding:2px 4px; border-radius:4px; transition:color .15s; flex-shrink:0;
    }
    .chat-item:hover .chat-item-del { opacity:1; }
    .chat-item-del:hover { color:var(--danger); }

    .sidebar-footer {
      padding:12px; border-top:1px solid var(--border);
      display:flex; flex-direction:column; gap:5px;
    }
    .stat-row { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    .stat-val { color:var(--accent); }

    /* ── MAIN ── */
    #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    #menuBtn {
      display:none; position:fixed; top:14px; left:14px; z-index:200;
      background:var(--bg2); border:1px solid var(--border); border-radius:8px;
      width:36px; height:36px; align-items:center; justify-content:center;
      cursor:pointer; color:var(--text);
    }
    .topbar {
      display:flex; align-items:center; padding:14px 20px;
      border-bottom:1px solid var(--border); gap:12px; flex-shrink:0; background:var(--bg);
    }
    .chat-title-display { font-size:15px; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .model-pill {
      background:rgba(110,255,200,0.08); border:1px solid rgba(110,255,200,0.2);
      color:var(--accent); font-size:11px; font-family:'JetBrains Mono',monospace;
      padding:4px 10px; border-radius:20px; white-space:nowrap;
    }

    #chat { flex:1; overflow-y:auto; padding:24px 20px; display:flex; flex-direction:column; gap:16px; }
    #chat::-webkit-scrollbar { width:4px; }
    #chat::-webkit-scrollbar-thumb { background:#1a2438; border-radius:4px; }

    .welcome { text-align:center; margin:auto; padding:40px 20px; max-width:480px; }
    .welcome-icon { font-size:42px; margin-bottom:14px; display:block; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .welcome h2 { font-size:28px; font-weight:800; line-height:1.2; margin-bottom:10px; letter-spacing:-.5px; }
    .welcome h2 span { color:var(--accent); }
    .welcome p { color:var(--muted); font-size:14px; line-height:1.7; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:22px; }
    .chip {
      background:var(--bg2); border:1px solid var(--border); border-radius:20px;
      padding:8px 14px; font-size:13px; color:#8898b8; cursor:pointer;
      transition:all .2s; font-family:'Syne',sans-serif;
    }
    .chip:hover { border-color:var(--accent); color:var(--accent); }

    .msg-row { display:flex; align-items:flex-end; gap:10px; animation:fadeUp .2s ease; }
    .msg-row.user { flex-direction:row-reverse; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    .avatar { width:30px; height:30px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
    .avatar.ai-av { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:var(--bg); }
    .avatar.user-av { background:rgba(59,130,246,0.2); border:1px solid rgba(59,130,246,0.3); color:var(--accent2); }

    .bubble { max-width:78%; padding:12px 16px; border-radius:16px; font-size:14.5px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
    .bubble.user { background:linear-gradient(135deg,#122040,#1a3666); border:1px solid rgba(59,130,246,0.25); border-bottom-right-radius:4px; }
    .bubble.ai { background:var(--bg2); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .bubble.error { background:#1a0d0d; border:1px solid rgba(255,95,87,0.3); color:#ff8080; font-size:13px; border-bottom-left-radius:4px; }
    .bubble code { font-family:'JetBrains Mono',monospace; background:rgba(0,0,0,0.35); padding:2px 6px; border-radius:4px; font-size:13px; }
    .bubble pre { background:#0a0f1e; border:1px solid rgba(110,255,200,0.1); border-radius:10px; padding:14px; margin-top:10px; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.6; }
    .bubble pre code { background:none; padding:0; }

    .cursor { display:inline-block; width:2px; height:1em; background:var(--accent); margin-left:2px; vertical-align:text-bottom; animation:blink .7s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .thinking { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:12px; font-size:13px; color:var(--muted); animation:fadeUp .2s ease; align-self:flex-start; }
    .think-dots { display:flex; gap:4px; }
    .think-dot { width:5px; height:5px; background:var(--accent); border-radius:50%; animation:dotPulse 1.4s ease-in-out infinite; }
    .think-dot:nth-child(2) { animation-delay:.2s; }
    .think-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes dotPulse { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }

    .input-area { padding:14px 20px; border-top:1px solid var(--border); background:var(--bg); display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
    .input-wrap { flex:1; background:var(--bg2); border:1px solid rgba(110,255,200,0.18); border-radius:14px; display:flex; align-items:flex-end; transition:border-color .2s; }
    .input-wrap:focus-within { border-color:rgba(110,255,200,0.45); }
    textarea { flex:1; background:transparent; border:none; color:var(--text); font-size:14.5px; font-family:'Syne',sans-serif; padding:12px 14px; resize:none; outline:none; max-height:130px; line-height:1.55; }
    textarea::placeholder { color:var(--muted); }
    #sendBtn { width:42px; height:42px; border-radius:11px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity .2s, transform .1s; }
    #sendBtn:hover { opacity:.85; }
    #sendBtn:active { transform:scale(.94); }
    #sendBtn:disabled { opacity:.3; cursor:default; }

    @media (max-width:680px) {
      #sidebar { position:fixed; top:0; left:0; bottom:0; transform:translateX(-100%); }
      #sidebar.open { transform:translateX(0); box-shadow:4px 0 30px rgba(0,0,0,0.6); }
      #menuBtn { display:flex; }
      .topbar { padding-left:58px; }
      #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
      #overlay.show { display:block; }
    }
    .no-chats { text-align:center; padding:20px 10px; font-size:12px; color:var(--muted); line-height:1.7; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">MC</div>
      <div>
        <h1>M<span>Chat</span></h1>
        <small>v3.2 · Gemini 2.5 Flash</small>
      </div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" id="tabReg" onclick="switchTab('reg')">Регистрация</button>
    </div>

    <div id="loginForm">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label class="auth-label">Пароль</label>
        <input class="auth-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="auth-btn" onclick="doLogin()">Войти →</button>
    </div>

    <div id="regForm" style="display:none">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label class="auth-label">Пароль</label>
        <input class="auth-input" id="regPass" type="password" placeholder="минимум 4 символа" autocomplete="new-password"/>
      </div>
      <div class="auth-field">
        <label class="auth-label">Повтор пароля</label>
        <input class="auth-input" id="regPass2" type="password" placeholder="••••••••"/>
      </div>
      <button class="auth-btn" onclick="doRegister()">Создать аккаунт →</button>
    </div>

    <div class="auth-err" id="authErr"></div>
    <div class="auth-hint">Данные хранятся локально в браузере</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="overlay" onclick="closeSidebar()"></div>
  <button id="menuBtn" onclick="toggleSidebar()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">MC</div>
      <div class="brand">
        <h1>M<span>Chat</span></h1>
        <small>v3.2 · Gemini 2.5 Flash</small>
      </div>
    </div>

    <div class="user-bar">
      <div class="user-ava" id="userAva">?</div>
      <div class="user-email" id="userEmail">...</div>
      <button class="user-logout" onclick="doLogout()" title="Выйти">⏏</button>
    </div>

    <button id="newChatBtn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Новый чат
    </button>

    <div class="section-label">История чатов</div>
    <div id="chatList"></div>

    <div class="sidebar-footer">
      <div class="stat-row"><span>Чатов</span><span class="stat-val" id="statChats">0</span></div>
      <div class="stat-row"><span>Сообщений</span><span class="stat-val" id="statMsgs">0</span></div>
      <div class="stat-row"><span>Модель</span><span class="stat-val">Gemini ✦</span></div>
    </div>
  </div>

  <div id="main">
    <div class="topbar">
      <div class="chat-title-display" id="chatTitleDisplay">Новый чат</div>
      <div class="model-pill">✦ Gemini 2.5 Flash</div>
    </div>
    <div id="chat"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Напиши сообщение..."></textarea>
      </div>
      <button id="sendBtn" onclick="send()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0a0f1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const API = "/api/chat";
  const SYSTEM = "Ты — MChat, умный и дружелюбный ИИ-помощник на базе Gemini 2.5 Flash. Отвечай чётко и полезно. Всегда отвечай на том языке, на котором пишет пользователь.";
  const DB_KEY = "mchat_v32_db";

  // ── UTILS ──
  const $ = id => document.getElementById(id);
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const hp = p => { let h=0; for(let i=0;i<p.length;i++) h=(Math.imul(31,h)+p.charCodeAt(i))|0; return h.toString(36); };
  const validEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

  // ── DB ──
  // структура: { users: { "email": { hash, chats:[] } }, session: "email"|null }
  function loadDB() { try { return JSON.parse(localStorage.getItem(DB_KEY)) || {users:{},session:null}; } catch { return {users:{},session:null}; } }
  function saveDB(db) { try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch {} }

  let currentEmail = null;
  let activeChatId = null;
  let sending = false;

  // ── HELPERS ──
  function getDB() { return loadDB(); }
  function getUserChats() { const db=getDB(); return db.users[currentEmail]?.chats || []; }
  function saveUserChats(chats) {
    const db=getDB();
    if(db.users[currentEmail]) db.users[currentEmail].chats = chats;
    saveDB(db); updateStats();
  }
  function getActive() {
    // всегда читаем свежие данные из storage
    const chats = getUserChats();
    return chats.find(c => c.id === activeChatId) || null;
  }

  // ── AUTH ──
  function switchTab(t) {
    $('tabLogin').classList.toggle('active', t==='login');
    $('tabReg').classList.toggle('active', t==='reg');
    $('loginForm').style.display = t==='login' ? '' : 'none';
    $('regForm').style.display = t==='reg' ? '' : 'none';
    $('authErr').style.display = 'none';
  }
  function showAuthErr(msg) { const e=$('authErr'); e.textContent=msg; e.style.display='block'; }

  function doLogin() {
    const email = $('loginEmail').value.trim().toLowerCase();
    const pass  = $('loginPass').value;
    if(!email||!pass) return showAuthErr('Заполни все поля');
    if(!validEmail(email)) return showAuthErr('Неверный формат email');
    const db = getDB();
    if(!db.users[email]) return showAuthErr('Аккаунт не найден');
    if(db.users[email].hash !== hp(pass)) return showAuthErr('Неверный пароль');
    db.session = email; saveDB(db);
    startApp(email);
  }

  function doRegister() {
    const email = $('regEmail').value.trim().toLowerCase();
    const pass  = $('regPass').value;
    const pass2 = $('regPass2').value;
    if(!email||!pass) return showAuthErr('Заполни все поля');
    if(!validEmail(email)) return showAuthErr('Неверный формат email');
    if(pass.length < 4) return showAuthErr('Пароль минимум 4 символа');
    if(pass !== pass2) return showAuthErr('Пароли не совпадают');
    const db = getDB();
    if(db.users[email]) return showAuthErr('Этот email уже занят');
    db.users[email] = { hash: hp(pass), chats: [] };
    db.session = email; saveDB(db);
    startApp(email);
  }

  function doLogout() {
    const db=getDB(); db.session=null; saveDB(db);
    currentEmail=null; activeChatId=null;
    $('app').style.display='none';
    $('authScreen').style.display='flex';
    $('loginEmail').value=''; $('loginPass').value='';
  }

  // автологин
  (function() {
    const db = getDB();
    if(db.session && db.users[db.session]) startApp(db.session);
  })();

  function startApp(email) {
    currentEmail = email;
    $('authScreen').style.display = 'none';
    $('app').style.display = 'flex';
    $('userEmail').textContent = email;
    $('userAva').textContent = email[0].toUpperCase();
    const chats = getUserChats();
    activeChatId = chats.length ? chats[0].id : null;
    if(!activeChatId) newChat();
    else { renderSidebar(); renderChat(); }
  }

  // ── CHAT MANAGEMENT ──
  function newChat() {
    const chats = getUserChats();
    const id = "c" + Date.now();
    chats.unshift({id, title:"Новый чат", messages:[]});
    activeChatId = id;
    saveUserChats(chats);
    renderSidebar(); renderChat(); closeSidebar();
    $('input').focus();
  }

  function switchChat(id) {
    activeChatId = id;
    renderSidebar(); renderChat(); closeSidebar();
  }

  function deleteChat(id, e) {
    e.stopPropagation();
    let chats = getUserChats().filter(c => c.id !== id);
    if(activeChatId === id) activeChatId = chats.length ? chats[0].id : null;
    saveUserChats(chats);
    renderSidebar(); renderChat();
  }

  // ── RENDER SIDEBAR ──
  function renderSidebar() {
    const chats = getUserChats();
    const list = $('chatList');
    if(!chats.length) { list.innerHTML='<div class="no-chats">Нет чатов.<br>Нажми «Новый чат».</div>'; return; }
    list.innerHTML = chats.map(c => `
      <div class="chat-item ${c.id===activeChatId?'active':''}" onclick="switchChat('${c.id}')">
        <span style="font-size:13px">💬</span>
        <span class="chat-item-title">${esc(c.title)}</span>
        <button class="chat-item-del" onclick="deleteChat('${c.id}',event)">✕</button>
      </div>`).join('');
  }

  function updateStats() {
    const chats = getUserChats();
    $('statChats').textContent = chats.length;
    $('statMsgs').textContent = chats.reduce((s,c) => s+c.messages.length, 0);
  }

  // ── RENDER CHAT ──
  const chatEl = () => $('chat');

  function renderChat() {
    const el = chatEl();
    el.innerHTML = '';
    const chat = getActive(); // читает из storage напрямую
    if(!chat || !chat.messages.length) {
      el.innerHTML = `<div class="welcome">
        <span class="welcome-icon">✦</span>
        <h2>Привет! Я <span>MChat</span></h2>
        <p>Умный помощник на базе Gemini 2.5 Flash.<br>Спроси что угодно — отвечу честно и быстро.</p>
        <div class="chips">
          <div class="chip" onclick="ask('Что сейчас происходит в мире?')">🌍 Новости</div>
          <div class="chip" onclick="ask('Напиши змейку на Python')">🐍 Код</div>
          <div class="chip" onclick="ask('Какой сейчас курс доллара?')">💵 Курс</div>
          <div class="chip" onclick="ask('Объясни квантовую физику просто')">⚛️ Наука</div>
          <div class="chip" onclick="ask('Расскажи анекдот')">😄 Анекдот</div>
          <div class="chip" onclick="ask('Лучшие фильмы 2025 года')">🎬 Кино</div>
        </div></div>`;
      $('chatTitleDisplay').textContent = 'Новый чат';
    } else {
      $('chatTitleDisplay').textContent = chat.title;
      // рендерим все сообщения без анимации
      chat.messages.forEach(m => {
        if(m.role !== 'system') addBubble(m.role === 'user' ? 'user' : 'ai', m.content, false);
      });
    }
    el.scrollTop = el.scrollHeight;
  }

  // ── BUBBLES ──
  function addBubble(role, text, animate=true) {
    const el = chatEl();
    const row = document.createElement('div'); row.className = 'msg-row '+role;
    if(!animate) row.style.animation = 'none';
    const av = document.createElement('div'); av.className = 'avatar '+(role==='ai'?'ai-av':'user-av');
    av.textContent = role==='ai' ? 'MC' : 'Я';
    const bub = document.createElement('div'); bub.className = 'bubble '+role;
    bub.innerHTML = role==='user' ? esc(text) : fmt(text);
    row.appendChild(av); row.appendChild(bub);
    el.appendChild(row); el.scrollTop = el.scrollHeight;
    return bub;
  }

  function fmt(text) {
    let h = esc(text);
    h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${c.trim()}</code></pre>`);
    h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    return h;
  }

  // ── TYPING ──
  function typeText(bub, text, speed=8) {
    return new Promise(resolve => {
      bub.innerHTML = '';
      const cur = document.createElement('span'); cur.className='cursor'; bub.appendChild(cur);
      let i = 0;
      const tick = setInterval(() => {
        if(i < text.length) {
          bub.innerHTML = fmt(text.slice(0,i+1));
          bub.appendChild(cur); i++;
          chatEl().scrollTop = chatEl().scrollHeight;
        } else {
          clearInterval(tick); cur.remove();
          bub.innerHTML = fmt(text); resolve();
        }
      }, speed);
    });
  }

  function showThinking() {
    removeThinking();
    const d = document.createElement('div'); d.className='thinking'; d.id='thinking';
    d.innerHTML=`<div class="think-dots"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div>Думаю...`;
    chatEl().appendChild(d); chatEl().scrollTop = chatEl().scrollHeight;
  }
  const removeThinking = () => $('thinking')?.remove();

  // ── SEND ──
  async function send() {
    const inp = $('input');
    const text = inp.value.trim();
    if(!text || sending) return;
    if(!activeChatId) newChat();

    // читаем свежие данные из storage
    let chats = getUserChats();
    let chat = chats.find(c => c.id === activeChatId);
    if(!chat) return;

    inp.value = ''; inp.style.height = 'auto';
    $('sendBtn').disabled = true; sending = true;

    if(!chat.messages.length) {
      chat.title = text.length > 36 ? text.slice(0,36)+'…' : text;
      $('chatTitleDisplay').textContent = chat.title;
    }

    chat.messages.push({role:'user', content:text});
    saveUserChats(chats);
    addBubble('user', text); renderSidebar(); showThinking();

    try {
      const res = await fetch(API, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          messages:[{role:'system',content:SYSTEM}, ...chat.messages.slice(-12)]
        })
      });

      removeThinking();
      const data = await res.json();

      if(!res.ok || data.error) {
        addErrBubble(data?.error?.message || 'Ошибка сервера');
        // откатываем последнее сообщение
        chats = getUserChats();
        const idx = chats.findIndex(c => c.id === activeChatId);
        if(idx !== -1 && chats[idx].messages.at(-1)?.role === 'user') {
          chats[idx].messages.pop(); saveUserChats(chats);
        }
        return;
      }

      const reply = data.choices?.[0]?.message?.content || 'Нет ответа.';

      // сохраняем ответ — читаем снова свежие данные
      chats = getUserChats();
      const idx = chats.findIndex(c => c.id === activeChatId);
      if(idx !== -1) { chats[idx].messages.push({role:'assistant',content:reply}); saveUserChats(chats); }
      renderSidebar();

      const bub = addBubble('ai', '');
      await typeText(bub, reply);

    } catch(err) {
      removeThinking();
      addErrBubble('Нет соединения. Проверь интернет.');
      chats = getUserChats();
      const idx = chats.findIndex(c => c.id === activeChatId);
      if(idx !== -1 && chats[idx].messages.at(-1)?.role === 'user') {
        chats[idx].messages.pop(); saveUserChats(chats);
      }
    } finally {
      $('sendBtn').disabled = false; sending = false; inp.focus();
    }
  }

  function addErrBubble(msg) {
    const row = document.createElement('div'); row.className='msg-row ai';
    row.innerHTML = `<div class="avatar ai-av">MC</div><div class="bubble error">⚠️ ${esc(msg)}</div>`;
    chatEl().appendChild(row); chatEl().scrollTop = chatEl().scrollHeight;
  }
  const ask = t => { if(!activeChatId) newChat(); $('input').value=t; send(); };

  const inp = $('input');
  inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,130)+'px'; });
  inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });

  // enter на форме входа
  ['loginEmail','loginPass'].forEach(id => $(id)?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); }));
  ['regEmail','regPass','regPass2'].forEach(id => $(id)?.addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); }));

  const toggleSidebar = () => { $('sidebar').classList.toggle('open'); $('overlay').classList.toggle('show'); };
  const closeSidebar  = () => { $('sidebar').classList.remove('open'); $('overlay').classList.remove('show'); };
</script>
</body>
</html>
