<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MChat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sidebar:    #1a1a1a;
      --bg:         #212121;
      --surface:    #2f2f2f;
      --surface2:   #3a3a3a;
      --border:     rgba(255,255,255,0.08);
      --border2:    rgba(255,255,255,0.12);
      --text:       #ececec;
      --text2:      #9b9b9b;
      --text3:      #6e6e6e;
      --accent:     #d97706;
      --accent-h:   #f59e0b;
      --danger:     #ef4444;
      --code-bg:    #1e1e1e;
      --sw:         260px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ══ SIDEBAR ══ */
    #sidebar {
      width: var(--sw);
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
      z-index: 50;
      border-right: 1px solid var(--border);
    }

    .sb-header {
      padding: 16px 12px 12px;
    }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 14px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .brand-icon {
      width: 30px; height: 30px;
      border-radius: 6px;
      background: linear-gradient(135deg, #d97706, #c2410c);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }

    .brand-text {
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.2px;
    }
    .brand-text em { font-style: normal; color: var(--accent-h); }

    .sb-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 10px;
      background: none; border: none;
      color: var(--text2); font-family: inherit;
      font-size: 14px; border-radius: 8px;
      cursor: pointer; text-align: left;
      transition: background .15s, color .15s;
    }
    .sb-btn:hover { background: var(--surface); color: var(--text); }
    .sb-btn svg { flex-shrink: 0; opacity: 0.7; }

    .sb-section {
      padding: 14px 12px 4px;
      font-size: 11px; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.07em;
    }

    #chatList {
      flex: 1; overflow-y: auto;
      padding: 2px 8px 8px;
    }
    #chatList::-webkit-scrollbar { width: 3px; }
    #chatList::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .ci {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 10px; border-radius: 8px;
      cursor: pointer; font-size: 13.5px;
      color: var(--text2); transition: background .15s, color .15s;
      position: relative;
    }
    .ci:hover { background: var(--surface); color: var(--text); }
    .ci.active { background: var(--surface); color: var(--text); }

    .ci-title {
      flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .ci-title input {
      background: none; border: none; outline: none;
      color: var(--text); font: inherit; width: 100%;
    }

    .ci-actions {
      display: none; gap: 2px; flex-shrink: 0;
    }
    .ci:hover .ci-actions { display: flex; }

    .ci-act {
      background: none; border: none; color: var(--text3);
      padding: 3px 4px; border-radius: 4px;
      cursor: pointer; transition: color .15s, background .15s;
      display: flex; align-items: center;
    }
    .ci-act:hover { color: var(--text); background: var(--surface2); }
    .ci-act.danger:hover { color: var(--danger); }

    .sb-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text3);
    }

    .no-chats {
      text-align: center; padding: 24px 12px;
      font-size: 12px; color: var(--text3); line-height: 1.8;
    }

    /* ══ MAIN ══ */
    #main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    #menuBtn {
      display: none; position: fixed;
      top: 12px; left: 12px; z-index: 200;
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--sidebar); border: 1px solid var(--border2);
      color: var(--text2); cursor: pointer;
      align-items: center; justify-content: center;
      transition: color .15s;
    }
    #menuBtn:hover { color: var(--text); }

    /* Topbar */
    .topbar {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
    }

    .topbar-title {
      font-size: 14px; color: var(--text2);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 300px;
    }

    .model-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      font-size: 12px; color: var(--text2);
      white-space: nowrap; flex-shrink: 0;
    }
    .model-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80;
    }

    /* ══ CHAT ══ */
    #chat {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    /* Welcome */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 24px; text-align: center;
    }
    .welcome-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #d97706, #c2410c);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: #fff;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(217,119,6,.25);
    }
    .welcome h2 {
      font-size: 28px; font-weight: 600;
      letter-spacing: -0.5px; margin-bottom: 10px;
    }
    .welcome h2 em { font-style: normal; color: var(--accent-h); }
    .welcome p { color: var(--text2); font-size: 15px; line-height: 1.65; margin-bottom: 30px; }

    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; max-width: 520px;
    }
    .chip {
      padding: 8px 16px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border2);
      font-size: 13.5px; color: var(--text2);
      cursor: pointer; font-family: inherit;
      transition: all .15s;
    }
    .chip:hover {
      background: var(--surface2); color: var(--text);
      border-color: rgba(255,255,255,.2);
    }

    /* Messages — Claude style full width rows */
    .msg-row {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      animation: msgIn .2s ease;
    }
    .msg-row:last-child { border-bottom: none; }
    .msg-row.user { background: var(--bg); }
    .msg-row.ai   { background: var(--bg); }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-inner {
      max-width: 680px; margin: 0 auto;
      padding: 0 24px;
      display: flex; gap: 18px; align-items: flex-start;
    }

    .msg-av {
      width: 34px; height: 34px; border-radius: 50%;
      flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      margin-top: 1px;
    }
    .msg-av.ai  { background: linear-gradient(135deg,#d97706,#c2410c); color:#fff; }
    .msg-av.usr { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }

    .msg-body { flex: 1; min-width: 0; }

    .msg-who {
      font-size: 13.5px; font-weight: 600;
      color: var(--text); margin-bottom: 6px;
    }

    .msg-txt {
      font-size: 15px; line-height: 1.78;
      color: var(--text); word-break: break-word;
    }

    /* Markdown */
    .msg-txt p { margin-bottom: 12px; }
    .msg-txt p:last-child { margin-bottom: 0; }
    .msg-txt h1,.msg-txt h2,.msg-txt h3,.msg-txt h4 {
      font-weight: 600; margin: 20px 0 8px; line-height: 1.3;
    }
    .msg-txt h1 { font-size: 21px; }
    .msg-txt h2 { font-size: 18px; }
    .msg-txt h3 { font-size: 16px; }
    .msg-txt ul,.msg-txt ol { padding-left: 22px; margin-bottom: 12px; }
    .msg-txt li { margin-bottom: 5px; line-height: 1.65; }
    .msg-txt strong { font-weight: 600; }
    .msg-txt em { font-style: italic; color: var(--text2); }
    .msg-txt a { color: var(--accent-h); text-decoration: underline; }
    .msg-txt blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 0 4px 16px;
      color: var(--text2); margin: 12px 0;
    }
    .msg-txt table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 14px; }
    .msg-txt th,.msg-txt td { border: 1px solid var(--border2); padding: 8px 12px; }
    .msg-txt th { background: var(--surface); font-weight: 600; }
    .msg-txt hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    /* Inline code */
    .msg-txt code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      background: var(--surface2);
      padding: 2px 6px; border-radius: 4px;
      font-size: 13px; color: #e5c07b;
    }

    /* Code blocks */
    .code-wrap {
      margin: 14px 0; border-radius: 10px;
      overflow: hidden; border: 1px solid var(--border2);
      background: var(--code-bg);
    }
    .code-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #252525;
      border-bottom: 1px solid var(--border);
    }
    .code-lang-label {
      font-family: monospace; font-size: 11px;
      color: var(--text3); text-transform: uppercase; letter-spacing: .05em;
    }
    .copy-code-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; color: var(--text3);
      font-size: 12px; font-family: inherit; cursor: pointer;
      padding: 3px 8px; border-radius: 4px;
      transition: background .15s, color .15s;
    }
    .copy-code-btn:hover { background: var(--surface2); color: var(--text); }
    .copy-code-btn.ok { color: #4ade80; }

    .code-wrap pre {
      padding: 16px; overflow-x: auto;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px; line-height: 1.65; color: #abb2bf;
    }
    .code-wrap pre code { background: none; padding: 0; color: inherit; font-size: inherit; }

    /* Msg footer actions */
    .msg-foot {
      display: flex; gap: 4px; margin-top: 12px;
      opacity: 0; transition: opacity .15s;
    }
    .msg-row:hover .msg-foot { opacity: 1; }

    .mf-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; color: var(--text3);
      font-size: 12px; font-family: inherit; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .mf-btn:hover { background: var(--surface); color: var(--text); }
    .mf-btn.ok { color: #4ade80; }

    /* Thinking */
    .thinking-row {
      padding: 24px 0;
    }
    .thinking-inner {
      max-width: 680px; margin: 0 auto;
      padding: 0 24px;
      display: flex; gap: 18px; align-items: center;
    }
    .thinking-av {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg,#d97706,#c2410c); color:#fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .thinking-dots { display: flex; gap: 5px; }
    .thinking-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text3);
      animation: td 1.4s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: .2s; }
    .thinking-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes td {
      0%,80%,100% { transform: scale(.65); opacity: .35; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Cursor */
    .cur {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent-h); margin-left: 1px;
      vertical-align: text-bottom;
      animation: bl .6s ease-in-out infinite;
    }
    @keyframes bl { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Error */
    .err-row {
      max-width: 680px; margin: 8px auto;
      padding: 12px 24px;
    }
    .err-box {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px; padding: 12px 16px;
      color: #f87171; font-size: 13.5px;
    }

    /* ══ INPUT ══ */
    .input-area {
      padding: 14px 20px 20px;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 680px; margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px; overflow: hidden;
      transition: border-color .2s;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    .input-wrap:focus-within {
      border-color: rgba(217,119,6,.4);
    }

    .input-row {
      display: flex; align-items: flex-end;
      padding: 12px 14px; gap: 10px;
    }

    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: inherit;
      font-size: 15px; resize: none;
      max-height: 200px; line-height: 1.55;
    }
    textarea::placeholder { color: var(--text3); }

    #sendBtn {
      width: 38px; height: 38px; border-radius: 10px;
      border: none; background: var(--accent);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s, opacity .15s;
    }
    #sendBtn:hover { background: var(--accent-h); }
    #sendBtn:active { transform: scale(.93); }
    #sendBtn:disabled { opacity: .3; cursor: default; }

    .input-hint {
      text-align: center; font-size: 11px;
      color: var(--text3); margin-top: 8px;
    }

    /* ══ MOBILE ══ */
    @media (max-width: 700px) {
      #sidebar {
        position: fixed; inset: 0 auto 0 0;
        transform: translateX(-100%);
      }
      #sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 40px rgba(0,0,0,.7);
      }
      #menuBtn { display: flex; }
      .topbar { padding-left: 56px; }
      #overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,.55); z-index: 49;
      }
      #overlay.show { display: block; }
    }
  </style>
</head>
<body>

<div id="overlay" onclick="closeSb()"></div>
<button id="menuBtn" onclick="toggleSb()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-header">
    <div class="sb-brand">
      <div class="brand-icon">MC</div>
      <div class="brand-text">M<em>Chat</em></div>
    </div>
    <button class="sb-btn" onclick="newChat()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Новый чат
    </button>
  </div>

  <div class="sb-section">История</div>
  <div id="chatList"></div>

  <div class="sb-footer">
    <span id="statLine">0 чатов · 0 сообщений</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="topTitle">MChat</div>
    <div class="model-badge">
      <div class="dot"></div>
      Gemini 2.5 Flash
    </div>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <div class="input-wrap">
      <div class="input-row">
        <textarea id="inp" rows="1" placeholder="Напиши сообщение MChat..."></textarea>
        <button id="sendBtn" onclick="send()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — перенос строки</div>
  </div>
</div>

<script>
const API = "/api/chat";
const SYSTEM = "Ты — MChat, умный и дружелюбный ИИ-помощник на базе Gemini 2.5 Flash. Отвечай чётко, полезно и развёрнуто. Используй Markdown: заголовки, списки, блоки кода. Всегда отвечай на том языке, на котором пишет пользователь.";
const KEY = "mchat_v5";

let chats = [], active = null, busy = false;

const $  = id => document.getElementById(id);
const inp = $("inp"), chatEl = $("chat"), sendBtn = $("sendBtn");

// Marked
const renderer = new marked.Renderer();
renderer.code = (token) => {
  const code = typeof token === "object" ? token.text : token;
  const lang = (typeof token === "object" ? token.lang : "") || "";
  const id = "c" + Math.random().toString(36).slice(2);
  return `<div class="code-wrap">
    <div class="code-bar">
      <span class="code-lang-label">${lang || "code"}</span>
      <button class="copy-code-btn" onclick="cpCode(this,'${id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Копировать
      </button>
    </div>
    <pre><code id="${id}">${esc(code)}</code></pre>
  </div>`;
};
marked.use({ renderer, breaks: true, gfm: true });

// Storage
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(chats)); } catch {}
  updateStats();
}
function load() {
  try { const r = localStorage.getItem(KEY); if (r) chats = JSON.parse(r); } catch {}
}

// Chats
function newChat() {
  const id = "c" + Date.now();
  chats.unshift({ id, title: "Новый чат", messages: [] });
  active = id; save(); renderSb(); renderChat(); closeSb(); inp.focus();
}
function switchChat(id) { active = id; renderSb(); renderChat(); closeSb(); }
function delChat(id, e) {
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  if (active === id) active = chats[0]?.id || null;
  save(); renderSb(); renderChat();
}
function startRename(id, e) {
  e.stopPropagation();
  const el = document.querySelector(`.ci[data-id="${id}"] .ci-title`);
  const chat = chats.find(c => c.id === id);
  if (!el || !chat) return;
  el.innerHTML = `<input value="${escA(chat.title)}" onblur="endRename('${id}',this)" onkeydown="if(event.key==='Enter'||event.key==='Escape')this.blur()">`;
  el.querySelector("input").focus(); el.querySelector("input").select();
}
function endRename(id, el) {
  const chat = chats.find(c => c.id === id);
  if (chat) { chat.title = el.value.trim() || "Новый чат"; save(); }
  renderSb();
  if (active === id) $("topTitle").textContent = chat?.title || "MChat";
}
function getActive() { return chats.find(c => c.id === active); }
function mkTitle(t) { return t.length > 38 ? t.slice(0, 38) + "…" : t; }

// Sidebar
function renderSb() {
  const el = $("chatList");
  if (!chats.length) { el.innerHTML = '<div class="no-chats">Нет чатов.<br>Нажми «Новый чат».</div>'; return; }
  el.innerHTML = chats.map(c => `
    <div class="ci${c.id === active ? " active" : ""}" data-id="${c.id}" onclick="switchChat('${c.id}')">
      <span class="ci-title">${esc(c.title)}</span>
      <div class="ci-actions">
        <button class="ci-act" onclick="startRename('${c.id}',event)" title="Переименовать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
        </button>
        <button class="ci-act danger" onclick="delChat('${c.id}',event)" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>`).join("");
}

function updateStats() {
  $("statLine").textContent = `${chats.length} чатов · ${chats.reduce((s,c)=>s+c.messages.length,0)} сообщений`;
}

// Render chat
function renderChat() {
  const chat = getActive();
  chatEl.innerHTML = "";
  if (!chat || !chat.messages.length) {
    chatEl.innerHTML = `<div class="welcome">
      <div class="welcome-icon">MC</div>
      <h2>Привет! Я <em>MChat</em></h2>
      <p>Умный помощник на базе Gemini 2.5 Flash.<br>Спроси что угодно — отвечу развёрнуто.</p>
      <div class="chips">
        <div class="chip" onclick="ask('Что сейчас происходит в мире?')">🌍 Новости</div>
        <div class="chip" onclick="ask('Напиши змейку на Python')">🐍 Код</div>
        <div class="chip" onclick="ask('Какой сейчас курс доллара?')">💵 Курс</div>
        <div class="chip" onclick="ask('Объясни квантовую физику просто')">⚛️ Наука</div>
        <div class="chip" onclick="ask('Расскажи смешной анекдот')">😄 Анекдот</div>
        <div class="chip" onclick="ask('Лучшие фильмы 2025 года')">🎬 Кино</div>
      </div>
    </div>`;
    $("topTitle").textContent = "MChat";
  } else {
    $("topTitle").textContent = chat.title;
    chat.messages.forEach(m => { if (m.role !== "system") addMsg(m.role === "user" ? "user" : "ai", m.content, false); });
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}

// Add message row
function addMsg(role, text, anim = true) {
  chatEl.querySelector(".welcome")?.remove();
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;
  if (!anim) row.style.animation = "none";

  const inner = document.createElement("div");
  inner.className = "msg-inner";

  const av = document.createElement("div");
  av.className = `msg-av ${role === "ai" ? "ai" : "usr"}`;
  av.textContent = role === "ai" ? "MC" : "Я";

  const body = document.createElement("div");
  body.className = "msg-body";

  const who = document.createElement("div");
  who.className = "msg-who";
  who.textContent = role === "ai" ? "MChat" : "Вы";

  const txt = document.createElement("div");
  txt.className = "msg-txt";
  txt.innerHTML = role === "user" ? esc(text) : md(text);

  // Footer actions
  const foot = document.createElement("div");
  foot.className = "msg-foot";
  const cpBtn = document.createElement("button");
  cpBtn.className = "mf-btn";
  cpBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`;
  cpBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      cpBtn.textContent = "✓ Скопировано"; cpBtn.classList.add("ok");
      setTimeout(() => { cpBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`; cpBtn.classList.remove("ok"); }, 2000);
    });
  };
  foot.appendChild(cpBtn);

  body.appendChild(who); body.appendChild(txt); body.appendChild(foot);
  inner.appendChild(av); inner.appendChild(body);
  row.appendChild(inner); chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return txt;
}

// Thinking
function showThinking() {
  rmThinking();
  const d = document.createElement("div");
  d.className = "thinking-row"; d.id = "thinking";
  d.innerHTML = `<div class="thinking-inner">
    <div class="thinking-av">MC</div>
    <div class="thinking-dots">
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
    </div>
  </div>`;
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
}
function rmThinking() { $("thinking")?.remove(); }

// Copy code
function cpCode(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.classList.add("ok"); btn.textContent = "✓ Скопировано";
    setTimeout(() => { btn.classList.remove("ok"); btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`; }, 2000);
  });
}

// Helpers
function md(t) { try { return marked.parse(t); } catch { return esc(t); } }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escA(s) { return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

// Send
async function send() {
  const text = inp.value.trim();
  if (!text || busy) return;
  if (!active) newChat();
  const chat = getActive(); if (!chat) return;

  inp.value = ""; inp.style.height = "auto";
  sendBtn.disabled = true; busy = true;

  if (!chat.messages.length) {
    chat.title = mkTitle(text);
    $("topTitle").textContent = chat.title;
  }

  chat.messages.push({ role: "user", content: text });
  save(); addMsg("user", text); renderSb(); showThinking();

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: [{ role: "system", content: SYSTEM }, ...chat.messages] }),
    });

    rmThinking();

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      const d = document.createElement("div"); d.className = "err-row";
      d.innerHTML = `<div class="err-box">⚠️ ${esc(e?.error?.message || "Ошибка сервера")}</div>`;
      chatEl.appendChild(d); chat.messages.pop(); save(); return;
    }

    const txtEl = addMsg("ai", "");
    const cur = document.createElement("span"); cur.className = "cur";
    txtEl.appendChild(cur);

    const reader = res.body.getReader(), decoder = new TextDecoder();
    let full = "", buf = "";

    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") continue;
        try {
          const j = JSON.parse(data);
          if (j.text) { full += j.text; cur.remove(); txtEl.innerHTML = md(full); txtEl.appendChild(cur); chatEl.scrollTop = chatEl.scrollHeight; }
        } catch {}
      }
    }

    cur.remove(); txtEl.innerHTML = md(full || "Нет ответа.");
    chat.messages.push({ role: "assistant", content: full });
    save(); renderSb();

  } catch {
    rmThinking();
    const d = document.createElement("div"); d.className = "err-row";
    d.innerHTML = `<div class="err-box">⚠️ Нет соединения. Проверь интернет.</div>`;
    chatEl.appendChild(d); chat.messages.pop(); save();
  } finally { sendBtn.disabled = false; busy = false; inp.focus(); }
}

function ask(t) { if (!active) newChat(); inp.value = t; send(); }

// Input resize
inp.addEventListener("input", () => { inp.style.height = "auto"; inp.style.height = Math.min(inp.scrollHeight, 200) + "px"; });
inp.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });

// Sidebar
function toggleSb() { $("sidebar").classList.toggle("open"); $("overlay").classList.toggle("show"); }
function closeSb()  { $("sidebar").classList.remove("open"); $("overlay").classList.remove("show"); }

// Init
load();
if (chats.length) active = chats[0].id;
renderChat(); renderSb(); updateStats();
</script>
