<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MotaAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      color: #e8eef8;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(126,255,212,0.15);
      background: #0a0f1e;
      flex-shrink: 0;
    }

    .logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7effd4, #3b82f6);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #0a0f1e; font-size: 16px;
    }

    header h1 { font-size: 20px; font-weight: 700; }
    header h1 span { color: #7effd4; }
    .subtitle { font-size: 11px; color: #6b7a99; margin-top: 2px; }

    .badge {
      margin-left: auto;
      background: rgba(126,255,212,0.1);
      border: 1px solid rgba(126,255,212,0.25);
      color: #7effd4;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #2a3555; border-radius: 4px; }

    .welcome {
      text-align: center;
      margin: auto;
      padding: 40px 20px;
    }
    .welcome h2 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    .welcome h2 span { color: #7effd4; }
    .welcome p { color: #6b7a99; font-size: 15px; line-height: 1.6; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .chip {
      background: #141c2e;
      border: 1px solid rgba(126,255,212,0.2);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      color: #a0b0cc;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { border-color: #7effd4; color: #7effd4; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      animation: fadeIn 0.25s ease;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #1a3a5c, #1e4d8c);
      border: 1px solid rgba(59,130,246,0.3);
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      align-self: flex-start;
      background: #141c2e;
      border: 1px solid rgba(126,255,212,0.15);
      border-bottom-left-radius: 4px;
    }

    .bubble.error {
      align-self: flex-start;
      background: #1e0f0f;
      border: 1px solid rgba(255,80,80,0.3);
      border-bottom-left-radius: 4px;
      color: #ff8080;
      font-size: 13px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #7effd4;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .searching {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #141c2e;
      border: 1px solid rgba(126,255,212,0.15);
      border-radius: 12px;
      font-size: 13px;
      color: #6b7a99;
      animation: fadeIn 0.25s ease;
    }

    .search-dot {
      width: 6px; height: 6px;
      background: #7effd4;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid rgba(126,255,212,0.1);
      background: #0a0f1e;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      background: #141c2e;
      border: 1px solid rgba(126,255,212,0.2);
      border-radius: 12px;
      color: #e8eef8; font-size: 15px; font-family: inherit;
      padding: 12px 14px; resize: none; outline: none;
      max-height: 120px; line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: rgba(126,255,212,0.5); }
    textarea::placeholder { color: #3d4d6a; }

    #sendBtn {
      width: 44px; height: 44px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #7effd4, #3b82f6);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

<header>
  <div class="logo">M</div>
  <div>
    <h1>Mota<span>AI</span></h1>
    <div class="subtitle">compound-beta · Groq</div>
  </div>
  <div class="badge">🌐 V2</div>
</header>

<div id="chat">
  <div class="welcome">
    <h2>Привет! Я <span>MotaAI</span> 👋</h2>
    <p>Теперь умею искать в интернете,<br>писать код и общаться на любом языке.</p>
    <div class="chips">
      <div class="chip" onclick="ask('Что сейчас происходит в мире?')">🌍 Новости</div>
      <div class="chip" onclick="ask('Напиши змейку на Python')">🐍 Код</div>
      <div class="chip" onclick="ask('Какой сейчас курс доллара к рублю?')">💵 Курс валют</div>
      <div class="chip" onclick="ask('Расскажи анекдот')">😄 Анекдот</div>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="Напиши сообщение..."></textarea>
  <button id="sendBtn" onclick="send()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="#0a0f1e" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const WORKER_URL = "https://motaai.mattmamaev.workers.dev";
  const SYSTEM = "Ты — MotaAI, умный и дружелюбный ИИ-помощник. У тебя есть доступ к интернету — используй его когда нужна актуальная информация. Отвечай чётко и полезно. Всегда отвечай на том языке, на котором пишет пользователь.";
  const history = [];

  const input = document.getElementById("input");
  const chat  = document.getElementById("chat");
  const btn   = document.getElementById("sendBtn");

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function ask(text) {
    input.value = text;
    send();
  }

  function addBubble(role, text = "") {
    chat.querySelector(".welcome")?.remove();
    const div = document.createElement("div");
    div.className = "bubble " + role;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showSearching() {
    const div = document.createElement("div");
    div.className = "searching";
    div.id = "searching";
    div.innerHTML = '<div class="search-dot"></div> Ищу в интернете...';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeSearching() {
    document.getElementById("searching")?.remove();
  }

  // Анимация печатания
  function typeText(bubble, text, speed = 12) {
    return new Promise(resolve => {
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      bubble.appendChild(cursor);

      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          bubble.innerText = text.slice(0, i + 1);
          bubble.appendChild(cursor);
          i++;
          chat.scrollTop = chat.scrollHeight;
        } else {
          clearInterval(interval);
          cursor.remove();
          resolve();
        }
      }, speed);
    });
  }

  async function send() {
    const text = input.value.trim();
    if (!text || btn.disabled) return;

    input.value = ""; input.style.height = "auto";
    btn.disabled = true;

    history.push({ role: "user", content: text });
    addBubble("user", text);
    showSearching();

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [{ role: "system", content: SYSTEM }, ...history]
        }),
      });

      const data = await res.json();
      removeSearching();

      if (!res.ok || data.error) {
        addBubble("error", "⚠️ " + (data?.error?.message || "Ошибка сервера"));
        history.pop();
        btn.disabled = false;
        return;
      }

      const reply = data.choices?.[0]?.message?.content || "Нет ответа.";
      history.push({ role: "assistant", content: reply });

      const bubble = addBubble("ai", "");
      await typeText(bubble, reply);

    } catch (err) {
      removeSearching();
      addBubble("error", "⚠️ Нет соединения. Проверь интернет.");
      history.pop();
    }

    btn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
